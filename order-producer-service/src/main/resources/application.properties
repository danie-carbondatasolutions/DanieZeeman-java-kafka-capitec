spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:30092}

# Serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Durability: all in-sync replicas must acknowledge before the send is considered successful
spring.kafka.producer.acks=all

# Batching: linger up to 20ms to allow records to accumulate into a larger batch
spring.kafka.producer.properties.linger.ms=20
spring.kafka.producer.properties.batch.size=32768

# Idempotent producer prevents duplicate messages on retry due to network errors
spring.kafka.producer.properties.enable.idempotence=true

# Retry on transient failures
spring.kafka.producer.retries=3
spring.kafka.producer.properties.max.block.ms=5000

spring.kafka.template.default-topic=${ORDER_TOPIC:order.placed}

# Configurable publish interval (ms)
producer.interval-ms=${PRODUCER_INTERVAL_MS:2000}
