apiVersion: v1
kind: Pod
metadata:
  name: kafka-ui
  labels:
    app: kafka-ui
spec:
  containers:
    - name: kafka-ui
      image: provectuslabs/kafka-ui:latest
      ports:
        - containerPort: 8080
      env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "local"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "kafka-service:9092"
      resources:
        requests:
          memory: "256Mi"
        limits:
          memory: "512Mi" 

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-service
spec:
  type: NodePort
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
   