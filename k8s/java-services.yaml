apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-order-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-order-producer
  template:
    metadata:
      labels:
        app: java-order-producer
    spec:
      containers:
        - name: java-order-producer
          image: replace-with-your-java-order-producer-image
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: ORDER_TOPIC
              value: "order.placed"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-payment-service
  template:
    metadata:
      labels:
        app: java-payment-service
    spec:
      containers:
        - name: java-payment-service
          image: replace-with-your-java-payment-service-image
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: ORDER_TOPIC
              value: "order.placed"
            - name: PAYMENT_SUCCESS_TOPIC
              value: "payment.succeeded"
            - name: PAYMENT_FAILED_TOPIC
              value: "payment.failed"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-inventory-service
  template:
    metadata:
      labels:
        app: java-inventory-service
    spec:
      containers:
        - name: java-inventory-service
          image: replace-with-your-java-inventory-service-image
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: PAYMENT_SUCCESS_TOPIC
              value: "payment.succeeded"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
